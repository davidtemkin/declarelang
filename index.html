<!doctype html>
<meta charset="utf-8">
<title>Declare — the UI language for the AI era</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="description" content="Declare — the declarative UI language for the AI era. Reactive by construction, compiled live in the browser. This whole page is written in it.">
<!-- Real icon FILES (not a data: URI): link crawlers — iMessage/Slack/etc. — ignore
     data-URI SVG favicons and fall back to a cached domain icon, so ship actual files. -->
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<!-- Open Graph / Twitter — absolute URLs are REQUIRED by crawlers, so these are the
     one place coupled to the GitHub Pages path; update them if the deploy path moves. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Declare">
<meta property="og:title" content="Declare — the UI language for the AI era">
<meta property="og:description" content="A declarative UI language — reactive by construction, compiled live in the browser. This whole page is written in it.">
<meta property="og:url" content="https://davidtemkin.github.io/declarelang/">
<meta property="og:image" content="https://davidtemkin.github.io/declarelang/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Declare — the UI language for the AI era">
<meta name="twitter:description" content="A declarative UI language, reactive by construction, that compiles live in the browser.">
<meta name="twitter:image" content="https://davidtemkin.github.io/declarelang/assets/og-image.png">
<style>html,body{margin:0;padding:0;background:#0B141B}</style>
<div id="host"></div>
<script type="module">
  // The homepage IS a Declare app. On a static host (GitHub Pages) boot-uniform.js
  // installs the service worker (which turns every other .declare into a run page —
  // browse-to-run) and runs THIS page via the canonical ladder:
  //   1. PREWARM — a committed precompiled artifact (bundles/cache/) that still
  //      validates against the deployed source renders with NO compiler at all;
  //   2. FAST PATH — else a cached in-browser compile of the unchanged source;
  //   3. SLOW PATH — else download the in-browser compiler, compile site.declare,
  //      render, and cache the result.
  //
  // The deployed .declare source is the source of truth; the precompiled artifact
  // is a self-VALIDATING cache (re-probed against the source), never a thing to
  // hand-sync. Paths are relative to this file → the tree is subpath-portable.
  import boot from "./bundles/declare-boot.js";
  boot({ main: "./examples/site/site.declare", demos: ["components", "reactivity", "spring", "states"] });
</script>
