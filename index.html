<meta name="color-scheme" content="dark">
<meta name="description" content="Declare — the declarative UI language for the AI era. Reactive by construction, compiled live in the browser. This whole page is written in it.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234C8DFF'/><stop offset='1' stop-color='%2337E0C8'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><path d='M13 9h-3v14h3M19 9h3v14h-3' fill='none' stroke='%23fff' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>html,body{margin:0;padding:0;background:#0B141B}</style>
<div id="host"></div>
<script type="module">
  // The homepage IS a Declare app. On a static host (GitHub Pages) boot-static.js:
  //   1. renders NOW from the committed precompiled artifact — no compiler download;
  //   2. re-probes the compile's dependency closure to see if the source moved since
  //      the prebuild (pure, ~5 KB of closure.js — no TypeScript, no bundle);
  //   3. warm-loads the ~1 MB in-browser compiler in the BACKGROUND, used only for a
  //      stale recompile or a live edit ("Edit this page", the demo editors).
  //
  // All paths are relative to this file → the whole tree is subpath-portable
  // (a project page lives under /<repo>/).
  import boot from "./web/boot-static.js";
  import artifact from "./examples/site/prebuilt/site.js";
  boot(artifact);
</script>
