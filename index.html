<!doctype html>
<meta charset="utf-8">
<title>Declare — the UI language for the AI era</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="description" content="Declare — the declarative UI language for the AI era. Reactive by construction, compiled live in the browser. This whole page is written in it.">
<!-- Real icon FILES (not a data: URI): link crawlers — iMessage/Slack/etc. — ignore
     data-URI SVG favicons and fall back to a cached domain icon, so ship actual files. -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Open Graph / Twitter — absolute URLs are REQUIRED by crawlers, so these are the
     one place coupled to the GitHub Pages path; update them if the deploy path moves. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Declare">
<meta property="og:title" content="Declare — the UI language for the AI era">
<meta property="og:description" content="A declarative UI language — reactive by construction, compiled live in the browser. This whole page is written in it.">
<meta property="og:url" content="https://davidtemkin.github.io/declarelang/">
<meta property="og:image" content="https://davidtemkin.github.io/declarelang/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Declare — the UI language for the AI era">
<meta name="twitter:description" content="A declarative UI language, reactive by construction, that compiles live in the browser.">
<meta name="twitter:image" content="https://davidtemkin.github.io/declarelang/og-image.png">
<style>html,body{margin:0;padding:0;background:#0B141B}</style>
<div id="host"></div>
<script type="module">
  // The homepage IS a Declare app. On a static host (GitHub Pages) boot-static.js:
  //   1. renders NOW from the committed precompiled artifact — no compiler download;
  //   2. re-probes the compile's dependency closure to see if the source moved since
  //      the prebuild (pure, ~5 KB of closure.js — no TypeScript, no bundle);
  //   3. warm-loads the ~1 MB in-browser compiler in the BACKGROUND, used only for a
  //      stale recompile or a live edit ("Edit this page", the demo editors).
  //
  // All paths are relative to this file → the whole tree is subpath-portable
  // (a project page lives under /<repo>/).
  import boot from "./web/boot-static.js";
  import artifact from "./examples/site/prebuilt/site.js";
  boot(artifact);
</script>
